# Example production-style Compose (adjust for your secrets and managed Postgres).
# Not wired by default — copy to your ops repo or merge patterns into your orchestrator.
#
# Build SPA with the public API URL visible in browsers:
#   VITE_API_BASE_URL=https://api.example.com/api/v1
#
# Do not run more than one one-off migration job concurrently; migrations are
# normally executed in CI/CD or a release container before rolling the API.

services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DEBUG: "false"
      EXPOSE_DOCS: "false"
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      DATABASE_URL: ${DATABASE_URL:?async postgres URL}
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: ${CORS_ORIGINS:?comma-separated SPA origins}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?public API base URL for browser}
    restart: unless-stopped
    ports:
      - "8080:8080"
