# Canonical VPS stack (Hostinger / bare IP). docker-compose.vps.example.yml is a duplicate for legacy `-f` names.
#
# Versioned `image:` names prevent Docker from reusing anonymous old `*-api` images that still
# contain pre–four-branch KYC schemas (the source of "بافلي/ترانس روفر/أخرى" 422 errors).
#
#   cd /opt/BavlyKYC/deploy
#   docker compose -f docker-compose.vps.yml --env-file .env up -d --build
#
# One-shot hard rebuild (run after git pull):
#   ./vps-redeploy.sh

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: bavly_kyc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - kyc_pgdata_vps:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bavly_kyc"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    # Name is project-specific so `docker pull` never fetches a random public `bavlykyc-api` image from Docker Hub.
    image: bavlykyc-stack-api:${BAVLYKYC_API_TAG:-kyc5}
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        KYC_SCHEMA_BUILD: ${KYC_SCHEMA_BUILD:-6}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in deploy/.env}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deploy/.env}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS in deploy/.env}
      DEBUG: "false"
      EXPOSE_DOCS: "false"
      JWT_ALGORITHM: HS256
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  web:
    image: bavlykyc-stack-web:${BAVLYKYC_WEB_TAG:-web5}
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        WEB_ASSETS_BUILD: ${WEB_ASSETS_BUILD:-6}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  kyc_pgdata_vps:
