# Example: TLS termination + routing for Bavly KYC in production.
# Replace server_name and certificate paths; adjust upstream ports to match your stack.
#
# Typical layout:
#   https://kyc.example.com     → SPA static (nginx:8080 or object storage + CDN)
#   https://api.kyc.example.com → FastAPI (Gunicorn/Uvicorn :8000)
#
# If SPA and API share one hostname, use path-based routing and set
# VITE_API_BASE_URL accordingly (e.g. https://kyc.example.com/api/v1) with matching
# location blocks for /api/v1/ → upstream API.

upstream kyc_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# --- API ---
server {
    listen 443 ssl http2;
    server_name api.kyc.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.kyc.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kyc.example.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Entire host → FastAPI (/health, /health/ready, /api/v1/…)
    location / {
        proxy_pass http://kyc_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# --- SPA (static container or another nginx serving dist/) ---
server {
    listen 443 ssl http2;
    server_name kyc.example.com;

    ssl_certificate     /etc/letsencrypt/live/kyc.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kyc.example.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
