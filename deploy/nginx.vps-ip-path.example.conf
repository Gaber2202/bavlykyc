# HTTP reverse proxy for Bavly KYC on a bare IP (e.g. before DNS + TLS).
# VPS: 187.127.142.186 — install as /etc/nginx/sites-available/bavlykyc → sites-enabled
#
# Upstreams: API on 127.0.0.1:8000, SPA container on 127.0.0.1:8080
# (see deploy/docker-compose.vps.yml — bind ports to localhost only)
#
#   curl http://187.127.142.186/health
#   curl http://187.127.142.186/health/ready
#   Open http://187.127.142.186 in browser (SPA)

upstream kyc_api_vps {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream kyc_web_vps {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name 187.127.142.186;

    client_max_body_size 25m;

    location /api/v1/ {
        proxy_pass http://kyc_api_vps;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://kyc_api_vps/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health/ready {
        proxy_pass http://kyc_api_vps/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://kyc_web_vps;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
